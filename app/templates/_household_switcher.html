  <form class="switcher" method="get" action="/household/{{ household.household_id }}"
        onsubmit="event.preventDefault(); window.location = '/household/' + document.getElementById('hh-switch').value;">
    <label>Household: <input id="hh-switch" value="{{ household.household_id }}"></label>
    <button type="submit">Open</button>
  </form>
