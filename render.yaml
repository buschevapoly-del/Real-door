services:
  - type: web
    name: realdoor
    runtime: python
    plan: free
    buildCommand: pip install -r app/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # No persistent disk on the free tier -- Render doesn't support disks
    # below the Starter plan. That means app_data/ (per-household JSON,
    # generated images, exported PDFs) resets on every deploy/restart,
    # which is fine for demoing but not for real applicant data. Add a
    # `disk:` block back (name/mountPath: /opt/render/project/src/app_data
    # /sizeGB) once upgraded to a paid plan, if persistence is needed.
